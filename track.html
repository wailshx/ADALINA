<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suivi de commande - ADALINA</title>
    <link rel="stylesheet" href="css/styles.css?v=__BUILD__">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        .track-page { max-width: 640px; margin: 0 auto; padding: 3rem 1.5rem; min-height: 60vh; }
        .track-page h1 { font-family: var(--font-heading); font-size: 1.8rem; text-align: center; margin-bottom: 2rem; letter-spacing: 0.04em; }
        .track-form { display: flex; flex-direction: column; gap: 1rem; margin-bottom: 2.5rem; }
        .track-form input { width: 100%; padding: 0.85rem 1rem; border: 1px solid var(--border-light); border-radius: var(--radius-sm); font-family: var(--font-body); font-size: 0.9rem; transition: border-color 0.2s; }
        .track-form input:focus { outline: none; border-color: var(--primary); }
        .track-form button { width: 100%; padding: 0.9rem; background: var(--charcoal, #1A1A1A); color: #fff; border: none; border-radius: var(--radius-sm); font-family: var(--font-body); font-size: 0.85rem; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; cursor: pointer; transition: opacity 0.2s; }
        .track-form button:hover { opacity: 0.85; }
        .track-result { display: none; }
        .track-result.active { display: block; }
        .track-order-info { background: var(--bg-cream, #F9F9FB); padding: 1.5rem; border-radius: var(--radius-md); margin-bottom: 2rem; }
        .track-order-info p { font-size: 0.85rem; margin: 0.3rem 0; }
        .track-order-info .order-num { font-weight: 600; font-size: 1rem; }
        .track-timeline { position: relative; padding-left: 2.5rem; }
        .track-timeline::before { content: ''; position: absolute; left: 11px; top: 0; bottom: 0; width: 2px; background: var(--border-light); }
        .track-step { position: relative; padding-bottom: 2rem; }
        .track-step:last-child { padding-bottom: 0; }
        .track-step-dot { position: absolute; left: -2.5rem; top: 2px; width: 24px; height: 24px; border-radius: 50%; background: var(--border-light); display: flex; align-items: center; justify-content: center; font-size: 0.7rem; color: #fff; }
        .track-step.done .track-step-dot { background: var(--primary); }
        .track-step.current .track-step-dot { background: var(--primary); box-shadow: 0 0 0 4px rgba(183, 143, 62, 0.2); animation: stepPulse 2s infinite; }
        @keyframes stepPulse { 0%, 100% { box-shadow: 0 0 0 4px rgba(183, 143, 62, 0.2); } 50% { box-shadow: 0 0 0 8px rgba(183, 143, 62, 0.1); } }
        .track-step-title { font-weight: 600; font-size: 0.9rem; margin-bottom: 0.2rem; }
        .track-step-date { font-size: 0.75rem; color: var(--text-light); }
        .track-step-note { font-size: 0.78rem; color: var(--text-secondary, #666); margin-top: 0.2rem; font-style: italic; }
        .track-step.pending .track-step-title { color: var(--text-light); opacity: 0.5; }
        .track-error { text-align: center; color: #dc2626; font-size: 0.9rem; padding: 2rem 0; }
        .track-loading { text-align: center; padding: 2rem 0; color: var(--text-light); }
        @media (max-width: 480px) { .track-page { padding: 2rem 1rem; } .track-page h1 { font-size: 1.4rem; } }
    </style>
</head>
<body>
    <div id="root">
        <header class="header">
            <div class="header-top-row">
                <div class="header-left">
                    <span class="header-availability">𝐃𝐢𝐬𝐩𝐨𝐧𝐢𝐛𝐥𝐞 𝟐𝟒𝐡/𝟐𝟒 𝐞𝐭 𝟕𝐣/𝟕</span>
                </div>
                <a href="index.html" class="logo-block">
                    <span class="logo">ADALINA</span>
                    <span class="logo-sub">BOUTIQUE EN LIGNE</span>
                </a>
                <div class="header-right">
                </div>
            </div>
            <div class="header-nav-row">
                <nav class="nav" id="nav-menu">
                    <ul class="nav-list">
                        <li class="nav-item"><a href="index.html" class="nav-link">HOME</a></li>
                        <li class="nav-item"><a href="shop.html" class="nav-link">SHOP</a></li>
                    </ul>
                </nav>
            </div>
        </header>
        
        <div class="track-page">
            <h1 data-i18n="order.tracking.title">Suivi de commande</h1>
            
            <form class="track-form" id="track-form" onsubmit="return trackOrder(event)">
                <input type="text" id="track-order" placeholder="Numéro de commande (ex: ADL-20260718-1234)" data-i18n-placeholder="order.tracking.orderNumber" required>
                <input type="text" id="track-phone" placeholder="4 derniers chiffres du téléphone" maxlength="4" pattern="[0-9]{4}" data-i18n-placeholder="order.tracking.phone" required>
                <button type="submit" data-i18n="order.tracking.track">Suivre</button>
            </form>
            
            <div class="track-loading" id="track-loading" style="display:none;">Chargement...</div>
            <div class="track-error" id="track-error" style="display:none;"></div>
            
            <div class="track-result" id="track-result">
                <div class="track-order-info" id="track-order-info"></div>
                <div class="track-timeline" id="track-timeline"></div>
            </div>
        </div>
        
        <footer class="footer">
            <div class="container">
                <div class="footer-bottom">
                    <p>&copy; ADALINA. Tous droits réservés.</p>
                </div>
            </div>
        </footer>
    </div>
    
    <script src="js/i18n.js"></script>
    <script>
    var TRACK_STATUSES = [
        { key: 'ordered', label: 'Commandée', icon: 'fa-shopping-bag' },
        { key: 'confirmed', label: 'Confirmée', icon: 'fa-check' },
        { key: 'preparing', label: 'En préparation', icon: 'fa-box' },
        { key: 'shipped', label: 'Expédiée', icon: 'fa-truck' },
        { key: 'delivered', label: 'Livrée', icon: 'fa-home' }
    ];
    var STATUS_ORDER = { 'pending': 0, 'confirmed': 1, 'preparing': 2, 'shipped': 3, 'delivered': 4 };
    
    function trackOrder(e) {
        e.preventDefault();
        var orderNum = document.getElementById('track-order').value.trim();
        var phoneLast4 = document.getElementById('track-phone').value.trim();
        if (!orderNum || phoneLast4.length !== 4) return false;
        
        document.getElementById('track-loading').style.display = 'block';
        document.getElementById('track-error').style.display = 'none';
        document.getElementById('track-result').classList.remove('active');
        
        fetch('/track/' + encodeURIComponent(orderNum) + '?phone=' + phoneLast4)
            .then(function(r) { return r.json(); })
            .then(function(data) {
                document.getElementById('track-loading').style.display = 'none';
                if (data.error) {
                    document.getElementById('track-error').textContent = data.error;
                    document.getElementById('track-error').style.display = 'block';
                    return;
                }
                renderTrackResult(data);
            })
            .catch(function() {
                document.getElementById('track-loading').style.display = 'none';
                document.getElementById('track-error').textContent = 'Erreur de connexion.';
                document.getElementById('track-error').style.display = 'block';
            });
        return false;
    }
    
    function renderTrackResult(order) {
        var info = '<p class="order-num">' + esc(order.order_number) + '</p>' +
            '<p>' + esc(order.customer_name) + '</p>' +
            '<p>' + esc(order.wilaya) + '</p>' +
            '<p>' + formatPriceDA(order.total_amount) + '</p>';
        document.getElementById('track-order-info').innerHTML = info;
        
        var currentIdx = order.history && order.history.length > 0 ? (STATUS_ORDER[order.history[0].status] || 0) : 0;
        var notesMap = {};
        if (order.history) {
            order.history.forEach(function(h) {
                notesMap[h.status] = h;
            });
        }
        
        var html = '';
        TRACK_STATUSES.forEach(function(step, idx) {
            var cls = idx < currentIdx ? 'done' : (idx === currentIdx ? 'current' : 'pending');
            var note = notesMap[step.key];
            var dateStr = note ? new Date(note.date).toLocaleDateString('fr-FR', { day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' }) : '';
            var noteText = note && note.note ? esc(note.note) : '';
            html += '<div class="track-step ' + cls + '">' +
                '<div class="track-step-dot"><i class="fas ' + step.icon + '"></i></div>' +
                '<div class="track-step-title">' + step.label + '</div>' +
                (dateStr ? '<div class="track-step-date">' + dateStr + '</div>' : '') +
                (noteText ? '<div class="track-step-note">' + noteText + '</div>' : '') +
                '</div>';
        });
        document.getElementById('track-timeline').innerHTML = html;
        document.getElementById('track-result').classList.add('active');
    }
    
    function esc(s) { var d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }
    function formatPriceDA(p) { return new Intl.NumberFormat('fr-DZ', { style: 'decimal' }).format(p || 0) + ' DA'; }
    
    window.addEventListener('DOMContentLoaded', function() {
        var params = new URLSearchParams(window.location.search);
        var orderNum = params.get('order');
        if (orderNum) {
            document.getElementById('track-order').value = orderNum;
        }
    });
    </script>
</body>
</html>
