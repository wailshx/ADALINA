<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - LUNA BELLE Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="css/admin.css">
    <script>
    fetch('/api/public/settings').then(function(r){return r.json()}).then(function(s){
        if (s.primary_color) document.documentElement.style.setProperty('--primary', s.primary_color);
        if (s.primary_dark) document.documentElement.style.setProperty('--primary-dark', s.primary_dark);
        if (s.secondary_color) {
            document.documentElement.style.setProperty('--secondary', s.secondary_color);
            document.documentElement.style.setProperty('--sidebar-bg', s.secondary_color);
            document.documentElement.style.setProperty('--sidebar-hover', s.secondary_color);
        }
        if (s.background_color) document.documentElement.style.setProperty('--content-bg', s.background_color);
        if (s.text_color) document.documentElement.style.setProperty('--text-dark', s.text_color);
        var brandEl = document.querySelector('.sidebar-brand h2');
        if (brandEl && s.store_name) {
            var parts = s.store_name.trim().split(/\s+/);
            if (parts.length > 1) { brandEl.innerHTML = parts.slice(0, -1).join(' ') + ' <span>' + parts[parts.length - 1] + '</span>'; }
            else { brandEl.textContent = s.store_name; }
        }
        var loginBrand = document.querySelector('.brand h2');
        if (loginBrand && s.store_name) loginBrand.textContent = s.store_name;
        if (s.logo_header) {
            document.querySelectorAll('.sidebar-brand img, .brand img').forEach(function(img) { img.src = s.logo_header; });
        }
        var titleEl = document.querySelector('title');
        if (titleEl && s.site_title) {
            var parts = titleEl.textContent.split(' - ');
            if (parts.length > 1) { titleEl.textContent = s.site_title + ' - ' + parts[parts.length - 1]; }
        }
        window.__adminSettings = s;
    }).catch(function(){});
    </script>
</head>
<body>
    <div class="login-page">
        <div class="login-box">
            <div class="brand">
                <img src="../images/logo.svg" alt="LUNA BELLE" style="width:32px;height:32px">
                <h2>LUNA BELLE</h2>
                <p>Admin Dashboard</p>
            </div>
            <div class="login-error" id="login-error">Invalid username or password.</div>
            <form id="login-form" action="/admin/login" method="POST">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" class="form-control" placeholder="admin" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" class="form-control" placeholder="Enter your password" required autocomplete="current-password">
                </div>
                <div class="form-group" style="display:flex;align-items:center;gap:8px;">
                    <input type="checkbox" id="remember" name="remember" value="on" style="width:16px;height:16px;">
                    <label for="remember" style="margin:0;font-size:0.8rem;">Remember me</label>
                </div>
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-sign-in-alt"></i> Sign In
                </button>
            </form>
            <script>
                if (window.location.search.includes('error=1')) {
                    document.getElementById('login-error').classList.add('show');
                }
            </script>
            <div class="form-footer">
                <a href="#">Forgot password?</a>
            </div>
        </div>
    </div>
</body>
</html>
